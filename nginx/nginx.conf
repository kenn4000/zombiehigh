events {}

http {
    upstream zombie_tag {
        server zombie-high:8080;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        # Certificate paths — replace with your actual cert files.
        # Example with Let's Encrypt (Certbot):
        #   ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
        #   ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
        ssl_certificate     /etc/ssl/certs/cert.pem;
        ssl_certificate_key /etc/ssl/private/key.pem;

        ssl_protocols    TLSv1.2 TLSv1.3;
        ssl_ciphers      HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        location / {
            proxy_pass         http://zombie_tag;
            proxy_http_version 1.1;

            # WebSocket upgrade (required for /ws endpoint)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeout to keep WebSocket connections alive
            proxy_read_timeout 86400s;
        }
    }
}
